<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Абсолютно Чёрный</title>

<style>

    text-align:center;
}

h1 {

}

    background:#d4a373;

    padding:15px;
    border-radius:15px;
    font-size:18px;
    margin-top:10px;
}

</head>

<body>

<h1>☕ Абсолютно Чёрный</h1>

</div>


<div class="menu">

<div class="price">
269 ₽
</div>

<button>
Добавить
</button>

</div>



<div class="card">

<h2>🥐 Брецель с кунжутом</h2>

<p>Свежая выпечка</p>

<div class="price">
219 ₽
</div>

<button>
Добавить
</button>

</div>



<div class="card">

<h2>🍋 Лимонад голубика-базилик</h2>

</div>

Добавить
</button>

</div>


</div>

</body>
</html>
