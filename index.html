<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Абсолютно Чёрный</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    text-align: center;
    padding: 25px;
}

h1 {
    margin: 0;
    font-size: 28px;
}

.subtitle {
    color: #aaa;
}

.container {
    padding: 15px;
}

.card {
    background: #1d1d1d;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 15px;
}

.price {
    color: #d7a86e;
    font-size: 20px;
    font-weight: bold;
}

button {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: #d7a86e;
    font-size: 16px;
}

.cart {
    position: fixed;
    bottom: 15px;
    left: 15px;
    right: 15px;
}
</style>

</head>

<body>

<header>
<h1>☕ Абсолютно Чёрный</h1>
<p class="subtitle">Кофе • Выпечка • Напитки</p>
</header>


<div class="container">

<div class="card">
<h2>☕ Капучино</h2>
<p>300 мл</p>
<div class="price">269 ₽</div>
<button onclick="add('Капучино')">
Добавить
</button>
</div>


<div class="card">
<h2>🥐 Брецель с кунжутом</h2>
<p>Свежая выпечка</p>
<div class="price">219 ₽</div>
<button onclick="add('Брецель')">
Добавить
</button>
</div>


<div class="card">
<h2>🍋 Лимонад голубика-базилик</h2>
<p>Авторский напиток</p>
<div class="price">350 ₽</div>
<button onclick="add('Лимонад')">
Добавить
</button>
</div>

</div>


<div class="cart">
<button onclick="showCart()">
🛒 Корзина
</button>
</div>


<script>

let cart = {};

const prices = {
    "Капучино": 269,
    "Брецель": 219,
    "Лимонад": 350
};

function add(item){

    if(cart[item]){
        cart[item]++;
    } else {
        cart[item]=1;
    }

    alert(item + " добавлен в корзину");
}


function showCart(){

let text="🛒 Ваш заказ:\n\n";
let total=0;

for(let item in cart){

let count=cart[item];
let sum=prices[item]*count;

text += item+" × "+count+" = "+sum+" ₽\n";

total+=sum;

}


if(total===0){

alert("Корзина пустая");

}

else{

text += "\nИтого: "+total+" ₽";

text += "\n\nДля оформления заказа напишите нам в Telegram";

alert(text);

}

}

</script>

</body>
</html>
