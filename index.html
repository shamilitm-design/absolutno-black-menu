<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Абсолютно Чёрный</title>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;
}


.header{
text-align:center;
padding:25px;
}


h1{
margin:0;
}


.gray{
color:#aaa;
}


.container{
padding:15px;
}


.card{

background:#1e1e1e;
border-radius:18px;
padding:15px;
margin-bottom:20px;

}


.card img{

width:100%;
border-radius:15px;

}


.price{

color:#d7a86e;
font-size:20px;
font-weight:bold;

}


button{

width:100%;
padding:14px;
margin-top:10px;

border:none;
border-radius:14px;

background:#d7a86e;

font-size:16px;

}


.cart{

position:fixed;

bottom:15px;
left:15px;
right:15px;

}


#cartWindow{

display:none;

position:fixed;

top:10%;
left:5%;
right:5%;

background:#222;

padding:20px;

border-radius:20px;

z-index:100;

}


</style>

</head>



<body>


<div class="header">

<h1>☕ Абсолютно Чёрный</h1>

<p class="gray">
Кофе • Выпечка • Напитки
</p>

</div>



<div class="container">


<h2>☕ Кофе</h2>


<div class="card">

<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600">


<h2>Капучино</h2>

<p>Нежный кофе с молочной пеной</p>

<div class="price">
269 ₽
</div>


<button onclick="add('Капучино',269)">
＋ Добавить
</button>


</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600">


<h2>Американо</h2>

<p>Классический кофе</p>

<div class="price">
199 ₽
</div>


<button onclick="add('Американо',199)">
＋ Добавить
</button>


</div>



<h2>🥐 Выпечка</h2>



<div class="card">

<img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=600">


<h2>Брецель с кунжутом</h2>

<p>Свежая выпечка</p>

<div class="price">
219 ₽
</div>


<button onclick="add('Брецель с кунжутом',219)">
＋ Добавить
</button>


</div>



<h2>🍋 Лимонады</h2>



<div class="card">

<img src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=600">


<h2>Голубика-базилик</h2>

<p>Авторский лимонад</p>


<div class="price">
350 ₽
</div>


<button onclick="add('Лимонад голубика-базилик',350)">
＋ Добавить
</button>


</div>



</div>





<div id="cartWindow">


<h2>
🛒 Корзина
</h2>


<div id="cartItems">

</div>


<h3 id="cartTotal">

</h3>



<button onclick="closeCart()">
Закрыть
</button>


<button onclick="order()">
✅ Оформить заказ
</button>


</div>





<div class="cart">

<button onclick="showCart()" id="cartButton">

🛒 Корзина пустая

</button>

</div>





<script>


let cart=[];




function add(name,price){


cart.push({

name:name,

price:price

});


updateCart();


}




function updateCart(){


let total=0;


cart.forEach(item=>{

total+=item.price;

});


let btn=document.getElementById("cartButton");


if(cart.length===0){

btn.innerHTML="🛒 Корзина пустая";

}

else{


btn.innerHTML=
"🛒 "+cart.length+" товар(а) • "+total+" ₽";


}


}





function showCart(){


let windowCart=document.getElementById("cartWindow");

let items=document.getElementById("cartItems");


items.innerHTML="";


let total=0;



cart.forEach((item,index)=>{


items.innerHTML+=`

<p>

${item.name} — ${item.price} ₽

<br>

<button onclick="removeItem(${index})">

❌ Удалить

</button>

</p>

`;


total+=item.price;


});



document.getElementById("cartTotal").innerHTML=

"Итого: "+total+" ₽";



windowCart.style.display="block";


}





function removeItem(index){


cart.splice(index,1);


updateCart();


showCart();


}





function closeCart(){


document.getElementById("cartWindow").style.display="none";


}





function order(){


if(cart.length===0){

alert("Корзина пустая");

return;

}



let text="Ваш заказ:\n\n";


cart.forEach(item=>{


text+=item.name+" — "+item.price+" ₽\n";


});



alert(text);


}



</script>



</body>

</html>
